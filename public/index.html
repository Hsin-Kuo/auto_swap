<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swap Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 32px 24px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 24px;
      color: #f8fafc;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    select {
      background: #1e2130;
      border: 1px solid #2d3348;
      color: #e2e8f0;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }

    .stats {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .stat {
      background: #1e2130;
      border: 1px solid #2d3348;
      border-radius: 10px;
      padding: 16px 20px;
      min-width: 140px;
    }

    .stat-label {
      font-size: 12px;
      color: #64748b;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 600;
      color: #f8fafc;
    }

    .stat-value.green { color: #4ade80; }
    .stat-value.red   { color: #f87171; }
    .stat-value.blue  { color: #60a5fa; }

    .chart-wrap {
      background: #1e2130;
      border: 1px solid #2d3348;
      border-radius: 10px;
      padding: 20px 24px;
      margin-bottom: 24px;
    }

    .chart-title {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 16px;
    }

    .chart-wrap canvas {
      max-height: 220px;
    }

    .table-wrap {
      overflow-x: auto;
      border-radius: 10px;
      border: 1px solid #2d3348;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead tr {
      background: #1e2130;
    }

    th {
      text-align: left;
      padding: 12px 16px;
      font-weight: 500;
      color: #94a3b8;
      white-space: nowrap;
      border-bottom: 1px solid #2d3348;
    }

    tbody tr {
      border-bottom: 1px solid #1e2130;
      transition: background 0.1s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #1a1f30; }

    td {
      padding: 12px 16px;
      white-space: nowrap;
      vertical-align: middle;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge-success { background: #14532d; color: #4ade80; }
    .badge-failed  { background: #450a0a; color: #f87171; }

    .dir-sol  { color: #fb923c; }
    .dir-usdc { color: #60a5fa; }

    .tx-link {
      color: #818cf8;
      text-decoration: none;
      font-family: monospace;
      font-size: 12px;
    }
    .tx-link:hover { text-decoration: underline; }

    .error-cell {
      color: #f87171;
      max-width: 300px;
      white-space: normal;
      font-size: 12px;
    }

    .delta-neg { color: #f87171; font-family: monospace; }
    .delta-pos { color: #4ade80; font-family: monospace; }

    .type-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }
    .type-leg1     { background: #1e3a5f; color: #60a5fa; }
    .type-leg2     { background: #1a3a2a; color: #4ade80; }
    .type-stopped  { background: #450a0a; color: #f87171; }
    .type-snapshot { background: #1e2a3a; color: #94a3b8; }

    tr.row-stopped  td { background: #1a0a0a; }
    tr.row-snapshot td { background: #131820; color: #64748b; font-size: 12px; }

    .empty {
      text-align: center;
      padding: 48px;
      color: #475569;
    }
  </style>
</head>
<body>
  <h1>Swap Dashboard</h1>

  <div class="controls">
    <select id="dateSelect"></select>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">總筆數</div>
      <div class="stat-value blue" id="statTotal">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">成功</div>
      <div class="stat-value green" id="statSuccess">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">失敗</div>
      <div class="stat-value red" id="statFailed">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">交易量（USDC）</div>
      <div class="stat-value" id="statVolume">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">總手續費（SOL）</div>
      <div class="stat-value red" id="statFee">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">平均手續費</div>
      <div class="stat-value" id="statFeeAvg">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">累積 USDC 損耗</div>
      <div class="stat-value red" id="statDeltaTotal">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">平均每輪損耗</div>
      <div class="stat-value" id="statDeltaAvg">—</div>
    </div>
  </div>

  <div class="chart-wrap">
    <div class="chart-title">USDC 累積損耗曲線（每輪 round-trip）</div>
    <canvas id="deltaChart" height="220"></canvas>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>時間</th>
          <th>類型</th>
          <th>輸入金額</th>
          <th>輸出金額</th>
          <th>狀態</th>
          <th>手續費（SOL）</th>
          <th>USDC Delta</th>
          <th>Tx Hash</th>
          <th>失敗原因</th>
        </tr>
      </thead>
      <tbody id="txBody">
        <tr><td colspan="8" class="empty">選擇日期載入資料</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    const dateSelect = document.getElementById("dateSelect");
    const txBody = document.getElementById("txBody");
    let deltaChart = null;

    async function loadDates() {
      const dates = await fetch("/api/dates").then(r => r.json());
      dateSelect.innerHTML = dates.map(d => `<option value="${d}">${d}</option>`).join("");
      if (dates.length > 0) loadTransactions(dates[0]);
    }

    async function loadTransactions(date) {
      const rows = await fetch(`/api/transactions?date=${date}`).then(r => r.json());

      if (rows.length === 0) {
        txBody.innerHTML = `<tr><td colspan="8" class="empty">無資料</td></tr>`;
        updateStats([]);
        drawDeltaChart([]);
        return;
      }

      updateStats(rows);
      drawDeltaChart(rows);

      txBody.innerHTML = rows.map(r => {
        const time = new Date(r.timestamp).toLocaleTimeString("zh-TW", { hour12: false });
        const dirClass = r.direction === "SOL_TO_USDC" ? "dir-sol" : "dir-usdc";
        const dirLabel = r.direction === "SOL_TO_USDC" ? "SOL → USDC" : "USDC → SOL";
        const badge = r.status === "success"
          ? `<span class="badge badge-success">成功</span>`
          : `<span class="badge badge-failed">失敗</span>`;
        const txLink = r.tx_hash
          ? `<a class="tx-link" href="https://solscan.io/tx/${r.tx_hash}" target="_blank">${r.tx_hash.slice(0, 8)}…${r.tx_hash.slice(-6)}</a>`
          : "—";
        const input  = r.input_amount  ? `${r.input_amount} ${r.input_token}`   : "—";
        const output = r.output_amount ? `${r.output_amount} ${r.output_token}` : "—";
        const fee    = r.fee_sol ? `${r.fee_sol}` : "—";
        const error  = r.error ? `<span class="error-cell">${escHtml(r.error)}</span>` : "—";

        let deltaCell = "—";
        if (r.usdc_delta !== undefined && r.usdc_delta !== "" && !isNaN(parseFloat(r.usdc_delta))) {
          const d = parseFloat(r.usdc_delta);
          const sign = d >= 0 ? "+" : "";
          const cls = d >= 0 ? "delta-pos" : "delta-neg";
          deltaCell = `<span class="${cls}">${sign}${d.toFixed(4)}</span>`;
        }

        const typeLabel = { leg1: "Leg 1　USDC → SOL", leg2: "Leg 2　SOL → USDC", stopped: "⚠ Bot 停止", balance_snapshot: "日初快照" }[r.type] ?? r.type ?? "—";
        const typeCls   = { leg1: "type-leg1", leg2: "type-leg2", stopped: "type-stopped", balance_snapshot: "type-snapshot" }[r.type] ?? "";
        const rowCls    = r.type === "stopped" ? " class=\"row-stopped\"" : r.type === "balance_snapshot" ? " class=\"row-snapshot\"" : "";

        if (r.type === "stopped") {
          return `<tr${rowCls}>
            <td>${time}</td>
            <td colspan="7"><span class="type-badge ${typeCls}">${typeLabel}</span> <span class="error-cell">${escHtml(r.error ?? "")}</span></td>
            <td>—</td>
          </tr>`;
        }

        if (r.type === "balance_snapshot") {
          return `<tr${rowCls}>
            <td>${time}</td>
            <td colspan="7"><span class="type-badge ${typeCls}">${typeLabel} ${snapDatetime(r.timestamp)}</span>&nbsp;&nbsp;SOL: <b>${r.input_amount}</b>&nbsp;&nbsp;USDC: <b>${r.output_amount}</b></td>
            <td>—</td>
          </tr>`;
        }

        return `<tr>
          <td>${time}</td>
          <td><span class="type-badge ${typeCls}">${typeLabel}</span></td>
          <td>${input}</td>
          <td>${output}</td>
          <td>${badge}</td>
          <td style="font-family:monospace;color:#fbbf24">${fee}</td>
          <td>${deltaCell}</td>
          <td>${txLink}</td>
          <td>${error}</td>
        </tr>`;
      }).join("");
    }

    function updateStats(rows) {
      const success = rows.filter(r => r.status === "success").length;
      const failed  = rows.length - success;

      let volume = 0;
      rows.forEach(r => {
        if (r.status !== "success") return;
        if (r.direction === "USDC_TO_SOL") volume += parseFloat(r.input_amount) || 0;
        else volume += parseFloat(r.output_amount) || 0;
      });

      let totalFee = 0, feeCount = 0;
      rows.forEach(r => {
        if (r.fee_sol) { totalFee += parseFloat(r.fee_sol) || 0; feeCount++; }
      });

      const deltaRows = rows.filter(r => r.usdc_delta !== undefined && r.usdc_delta !== "" && !isNaN(parseFloat(r.usdc_delta)));
      const totalDelta = deltaRows.reduce((sum, r) => sum + parseFloat(r.usdc_delta), 0);
      const avgDelta   = deltaRows.length > 0 ? totalDelta / deltaRows.length : null;

      document.getElementById("statTotal").textContent   = rows.length;
      document.getElementById("statSuccess").textContent = success;
      document.getElementById("statFailed").textContent  = failed;
      document.getElementById("statVolume").textContent  = volume.toFixed(2);
      document.getElementById("statFee").textContent     = totalFee.toFixed(6) + " SOL";
      document.getElementById("statFeeAvg").textContent  = feeCount > 0 ? (totalFee / feeCount).toFixed(6) + " SOL" : "—";
      document.getElementById("statDeltaTotal").textContent = deltaRows.length > 0
        ? (totalDelta >= 0 ? "+" : "") + totalDelta.toFixed(4) + " USDC" : "—";
      document.getElementById("statDeltaAvg").textContent = avgDelta !== null
        ? (avgDelta >= 0 ? "+" : "") + avgDelta.toFixed(4) + " USDC" : "—";
    }

    function drawDeltaChart(rows) {
      const ctx = document.getElementById("deltaChart").getContext("2d");

      // 只取有 usdc_delta 的成功 Leg2
      const deltaRows = rows.filter(r => r.usdc_delta !== undefined && r.usdc_delta !== "" && !isNaN(parseFloat(r.usdc_delta)));

      if (deltaChart) { deltaChart.destroy(); deltaChart = null; }

      if (deltaRows.length === 0) return;

      let cumulative = 0;
      const labels = [];
      const data = [];
      deltaRows.forEach((r, i) => {
        cumulative += parseFloat(r.usdc_delta);
        labels.push(`#${i + 1} ${new Date(r.timestamp).toLocaleTimeString("zh-TW", { hour12: false, hour: "2-digit", minute: "2-digit" })}`);
        data.push(parseFloat(cumulative.toFixed(4)));
      });

      deltaChart = new Chart(ctx, {
        type: "line",
        data: {
          labels,
          datasets: [{
            label: "累積 USDC 損耗",
            data,
            borderColor: "#f87171",
            backgroundColor: "rgba(248,113,113,0.08)",
            borderWidth: 2,
            pointRadius: data.length > 60 ? 0 : 3,
            pointHoverRadius: 5,
            fill: true,
            tension: 0.3,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: "index", intersect: false },
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => `累積損耗：${ctx.parsed.y >= 0 ? "+" : ""}${ctx.parsed.y.toFixed(4)} USDC`,
              },
            },
          },
          scales: {
            x: {
              ticks: { color: "#64748b", maxTicksLimit: 10 },
              grid: { color: "#1e2130" },
            },
            y: {
              ticks: {
                color: "#64748b",
                callback: v => (v >= 0 ? "+" : "") + v.toFixed(3),
              },
              grid: { color: "#2d3348" },
            },
          },
        },
      });
    }

    function snapDatetime(ts) {
      const d = new Date(ts);
      const pad = n => String(n).padStart(2, "0");
      const tpe = new Date(d.getTime() + 8 * 3600_000);
      const yyyy = tpe.getUTCFullYear();
      const mm   = pad(tpe.getUTCMonth() + 1);
      const dd   = pad(tpe.getUTCDate());
      const HH   = pad(tpe.getUTCHours());
      const MM   = pad(tpe.getUTCMinutes());
      const SS   = pad(tpe.getUTCSeconds());
      return `${yyyy}${mm}${dd} ${HH}:${MM}:${SS}`;
    }

    function escHtml(str) {
      return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    dateSelect.addEventListener("change", () => loadTransactions(dateSelect.value));
    loadDates();
  </script>
</body>
</html>
